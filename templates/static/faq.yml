hero:
  title: "Everything you need to know about NewsBlur"
  subtitle: "Find answers to common questions about features, pricing, training, AI, and more."

tiers:
  - id: free
    name: "Free"
    price: ""
    href: "/pricing"
    description: "64 sites, real-time RSS, intelligence training by author, tag, and title, blurblog sharing, and native iOS and Android apps."
  - id: premium
    name: "Premium"
