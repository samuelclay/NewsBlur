name: iOS Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-tests:
    name: iOS Tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iOS Swift package tests
        run: swift test --parallel

      - name: Build iOS Xcode test bundles
        run: |
          mkdir -p TestResults
          xcodebuild build-for-testing \
            -project NewsBlur.xcodeproj \
            -scheme NewsBlur \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16e' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            RUN_CLANG_STATIC_ANALYZER=NO

      - name: Run iOS app-hosted tests
        run: |
          xcodebuild test-without-building \
            -project NewsBlur.xcodeproj \
            -scheme NewsBlur \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16e' \
            -derivedDataPath DerivedData \
            -parallel-testing-enabled NO \
            -only-testing:NewsBlurTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            RUN_CLANG_STATIC_ANALYZER=NO \
            -resultBundlePath TestResults/NewsBlurTests.xcresult

      - name: Run iOS UI smoke tests
        run: |
          xcodebuild test-without-building \
            -project NewsBlur.xcodeproj \
            -scheme NewsBlur \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16e' \
            -derivedDataPath DerivedData \
            -parallel-testing-enabled NO \
            -only-testing:NewsBlurUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            RUN_CLANG_STATIC_ANALYZER=NO \
            -resultBundlePath TestResults/NewsBlurUITests.xcresult

      - name: Upload iOS xcresult
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: ios-newsblur-tests-xcresults
          path: clients/ios/TestResults/*.xcresult
          if-no-files-found: ignore
