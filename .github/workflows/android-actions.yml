name: Mobile Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/android/NewsBlur
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - name: Run Android unit tests
        run: ./gradlew -Pci --console=plain :app:testDebugUnitTest

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_5
          working-directory: clients/android/NewsBlur
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew -Pci --console=plain :app:connectedDebugAndroidTest

      - name: Android Test Report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: ${{ always() }}

  ios-tests:
    name: iOS Tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iOS Swift package tests
        run: swift test --parallel

      - name: Run iOS app-hosted tests
        run: |
          mkdir -p TestResults
          xcodebuild test \
            -project NewsBlur.xcodeproj \
            -scheme NewsBlur \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16e' \
            -only-testing:NewsBlurTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            RUN_CLANG_STATIC_ANALYZER=NO \
            -resultBundlePath TestResults/NewsBlurTests.xcresult

      - name: Upload iOS xcresult
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: ios-newsblur-tests-xcresult
          path: clients/ios/TestResults/NewsBlurTests.xcresult
          if-no-files-found: ignore
