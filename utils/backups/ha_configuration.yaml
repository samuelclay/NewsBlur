# Add to Home Assistant configuration.yaml
# The mount_backup_drive command should already exist.
# Add offsite_backup to the same shell_command: block.

shell_command:
  mount_backup_drive: "/config/scripts/mount_backup_drive.sh"
  offsite_backup: "/config/scripts/mount_backup_drive.sh && /config/scripts/offsite_pull.sh >> /media/newsblur-backup/backup_run.log 2>&1; /config/scripts/unmount_backup_drive.sh"

# Then create an automation in the HA UI or in automations.yaml:
#
# - alias: "Nightly NewsBlur off-site backup"
#   trigger:
#     - platform: time
#       at: "06:00:00"
#   action:
#     - service: shell_command.offsite_backup
#
# NOTE: offsite_pull.sh unmounts the drive when it finishes, so the drive
# spins down between backups. Do NOT add a boot-time mount automation.
