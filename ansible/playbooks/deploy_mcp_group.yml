---
# Included task file for deploying MCP server
- name: Pull newsblur_web github
  git:
    repo: https://github.com/samuelclay/NewsBlur.git
    dest: /srv/newsblur/
    version: "{{ git_branch }}"

- name: Pull latest MCP Docker image
  become: yes
  docker_image:
    name: newsblur/newsblur_mcp
    source: pull

- name: Read MCP OAuth secret from local_settings.py
  shell: grep -oP "^MCP_OAUTH_CLIENT_SECRET\s*=\s*['\"]\\K[^'\"]*" /srv/newsblur/newsblur_web/local_settings.py
  register: mcp_secret_result
  changed_when: false

- name: Read MCP Sentry DSN from local_settings.py
  shell: grep -oP "^MCP_SENTRY_DSN\s*=\s*['\"]\\K[^'\"]*" /srv/newsblur/newsblur_web/local_settings.py
  register: mcp_sentry_result
  changed_when: false
  ignore_errors: yes

- name: Set MCP secret facts
  set_fact:
    mcp_oauth_client_id: "newsblur-mcp-server"
    mcp_oauth_client_secret: "{{ mcp_secret_result.stdout }}"
    mcp_sentry_dsn: "{{ mcp_sentry_result.stdout | default('') }}"

- include_tasks: ../roles/mcp/tasks/container.yml
  vars:
    container_restart: true

- name: Wait for MCP container to be ready
  uri:
    url: "http://localhost:8099/health"
    status_code: [200, 404, 405]
  register: mcp_result
  retries: 10
  delay: 3
  until: mcp_result.status in [200, 404, 405]
  ignore_errors: yes

